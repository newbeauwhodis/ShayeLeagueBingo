<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>League Bingo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(ellipse at top, #16233d 0%, #0a1220 60%, #050810 100%);
    font-family: 'Inter', sans-serif;
    color: #f0e6d2;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 60px;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-size: 30px;
    margin: 0 0 4px;
    background: linear-gradient(180deg, #f0e6d2 0%, #c8aa6e 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-align: center;
  }

  .subtitle {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #5b8a8a;
    margin-bottom: 28px;
    text-align: center;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }

  button.ctrl {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: rgba(200,170,110,0.08);
    border: 1px solid #6a5a35;
    color: #c8aa6e;
    padding: 9px 16px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  button.ctrl:hover {
    background: #c8aa6e;
    color: #0a1220;
  }

  .board-frame {
    position: relative;
    padding: 14px;
    background: linear-gradient(160deg, #1a2740 0%, #0d1626 100%);
    border: 1px solid #3a4a5f;
    border-radius: 8px;
    box-shadow: 0 0 0 1px rgba(200,170,110,0.15), 0 20px 60px rgba(0,0,0,0.5);
  }

  .board {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    width: min(88vw, 620px);
  }

  .cell {
    position: relative;
    aspect-ratio: 1 / 1;
    background: #101d33;
    border: 1px solid #2b3c54;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 8px;
    cursor: pointer;
    font-size: 12px;
    line-height: 1.35;
    color: #d6dde8;
    transition: transform 0.12s ease, background 0.2s ease, border-color 0.2s ease;
    user-select: none;
  }

  .cell:hover {
    border-color: #5b8a8a;
    transform: translateY(-1px);
  }

  .cell.free {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #0a1220;
    background: linear-gradient(160deg, #d8c28e, #a9803f);
    border-color: #c8aa6e;
    font-size: 14px;
  }

  .cell.marked {
    background: linear-gradient(160deg, #7a2323, #4a1010);
    border-color: #d13b3b;
    color: #ffe1e1;
  }
  .cell.marked::after {
    content: "";
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(255,150,150,0.5);
    border-radius: 3px;
    pointer-events: none;
  }

  .cell.win {
    animation: glow 1.1s ease-in-out infinite alternate;
    border-color: #c8aa6e;
  }
  @keyframes glow {
    from { box-shadow: 0 0 6px 0px rgba(200,170,110,0.4); }
    to { box-shadow: 0 0 16px 4px rgba(200,170,110,0.85); }
  }

  .banner {
    margin-top: 22px;
    font-family: 'Cinzel', serif;
    font-size: 22px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #c8aa6e;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    text-align: center;
  }
  .banner.show {
    opacity: 1;
    transform: translateY(0);
  }

  .footnote {
    margin-top: 10px;
    font-size: 11px;
    color: #46586e;
    text-align: center;
  }
</style>
</head>
<body>

<h1>League Bingo</h1>
<div class="subtitle">a league of legends bingo board</div>

<div class="controls">
  <button class="ctrl" id="reshuffle">Reshuffle</button>
  <button class="ctrl" id="reset">Clear board</button>
</div>

<div class="board-frame">
  <div class="board" id="board"></div>
</div>

<div class="banner" id="banner">Bingo</div>
<div class="footnote">click a square when it happens live &middot; center is free</div>

<script>
const squares = [
  "someone insta-locks yasuo",
  "\"ff15\" before 10 minutes",
  "\"jungle diff\" in all chat",
  "\"ez\" typed after the game",
  "someone locks yuumi support",
  "disconnect at the worst time",
  "jungle skips every objective",
  "client crashes mid-queue",
  "stuck on the loading screen",
  "client freezes during champ select",
  "has to relaunch the client",
  "someone dodges champ select",
  "teammates afk",
  "someone int-feeds on purpose",
  "team argues about who's smurfing",
  "pentakill, then still loses",
  "someone rage-buys wrong items",
  "someone says \"skill issue\"",
  "top laner shows up to a teamfight late",
  "someone flames in champ select before the game starts",
  "useless spam pings",
  "spams emotes on repeat",
  "misses a minion",
  "support steals a cannon minion",
  "jungle takes a wave",
  "circle hate",
  "support can't hide",
  "team face checks a bush",
  "has to report someone",
  "sexist comments",
  "hate speech",
  "most damage, still blamed for the loss",
  "cait gets banned",
  "jungle takes drag with no smite and it gets stolen",
  "teammate trashtalks own team in all chat",
  "\"bot diff\" but bot is the only one who won lane",
  "support insta-locks an enchanter",
  "player declines ready check",
  "assigned role didn't get selected",
  "a stupid remake happens",
  "shaye makes tokyo drift sounds",
  "shaye forgets the vpn",
  "shaye's so locked in she falls behind in chat",
  "shaye says \"push push push\"",
  "shaye sings \"do you wanna kill a dragon\"",
  "shaye insults a player's name or brings up rachel",
  "support recalls in vision",
  "viking kill-steals on nautilus support",
  "gets camped and own jungle does nothing",
  "teammate comes into twitch chat and is rude",
  "shaye says \"there's a bear in there\""
];

const POOL_SIZE = 24;

let order = [];
let marked = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildOrder() {
  const shuffled = shuffle(squares).slice(0, POOL_SIZE);
  const withFree = [...shuffled];
  withFree.splice(12, 0, "FREE");
  return withFree;
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  order.forEach((text, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell' + (i === 12 ? ' free' : '') + (marked[i] ? ' marked' : '');
    cell.textContent = text;
    cell.dataset.index = i;
    if (i !== 12) {
      cell.addEventListener('click', () => toggle(i));
    }
    board.appendChild(cell);
  });
  checkWin();
}

function toggle(i) {
  marked[i] = !marked[i];
  render();
}

function checkWin() {
  const lines = [];
  for (let r = 0; r < 5; r++) lines.push([0,1,2,3,4].map(c => r*5+c));
  for (let c = 0; c < 5; c++) lines.push([0,1,2,3,4].map(r => r*5+c));
  lines.push([0,6,12,18,24]);
  lines.push([4,8,12,16,20]);

  const cells = document.querySelectorAll('.cell');
  cells.forEach(c => c.classList.remove('win'));

  let won = false;
  lines.forEach(line => {
    if (line.every(idx => marked[idx] || idx === 12)) {
      won = true;
      line.forEach(idx => {
        const el = document.querySelector('.cell[data-index="' + idx + '"]');
        if (el) el.classList.add('win');
      });
    }
  });

  const banner = document.getElementById('banner');
  banner.classList.toggle('show', won);
}

function newGame() {
  order = buildOrder();
  marked = order.map(() => false);
  render();
}

document.getElementById('reshuffle').addEventListener('click', newGame);
document.getElementById('reset').addEventListener('click', () => {
  marked = order.map(() => false);
  render();
});

newGame();
</script>

</body>
</html>
