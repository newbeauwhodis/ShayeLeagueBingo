<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>League Bingo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(180deg, #2c5b75 0%, #1c3e52 45%, #0f2530 100%);
    font-family: 'Inter', sans-serif;
    color: #1f1f3a;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 60px;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-size: 30px;
    margin: 0 0 4px;
    color: #feffeb;
    text-align: center;
  }

  .logo-badge {
    padding: 8px;
    margin-bottom: 4px;
  }
  .logo-badge img {
    display: block;
    height: 150px;
    width: auto;
  }

  .twitch-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-decoration: none;
    color: #feffeb;
    background: #9146FF;
    border: 1px solid #1f1f3a;
    padding: 9px 18px;
    border-radius: 999px;
    margin-bottom: 22px;
    transition: transform 0.12s ease, box-shadow 0.15s ease;
  }
  .twitch-link:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(31,31,58,0.35);
  }

  .subtitle {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #bfe6f5;
    margin-bottom: 28px;
    text-align: center;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }

  button.ctrl {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: #feffeb;
    border: 1px solid #1f1f3a;
    color: #1f1f3a;
    padding: 9px 16px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  button.ctrl:hover {
    background: #1f1f3a;
    color: #feffeb;
  }

  .board-frame {
    position: relative;
    padding: 14px;
    background: linear-gradient(160deg, #feffeb 0%, #f5f3dd 100%);
    border: 2px solid #1f1f3a;
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(31,31,58,0.25);
    overflow: hidden;
  }

  .flash-overlay {
    position: fixed;
    inset: 0;
    background: #7de0ff;
    opacity: 0;
    pointer-events: none;
    z-index: 10;
  }
  .flash-overlay.flash-active {
    animation: boardflash 0.4s ease-in-out 2;
  }
  @keyframes boardflash {
    0%   { opacity: 0; }
    50%  { opacity: 0.25; }
    100% { opacity: 0; }
  }

  .board {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    width: min(88vw, 620px);
  }

  .cell {
    position: relative;
    aspect-ratio: 1 / 1;
    background: #0d0d15;
    border: 2px solid #7de0ff;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    line-height: 1.25;
    color: #feffeb;
    transition: transform 0.12s ease, background 0.2s ease, border-color 0.2s ease;
    user-select: none;
  }

  .cell:hover {
    border-color: #7de0ff;
    transform: translateY(-1px);
  }

  .cell.free {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #feffeb;
    background: linear-gradient(160deg, #7de0ff, #4bb8e0);
    border-color: #1f1f3a;
    font-size: 14px;
  }

  .cell.marked {
    background: linear-gradient(160deg, #7de0ff, #4bb8e0);
    border-color: #1f1f3a;
    color: #1f1f3a;
  }
  .cell.marked::after {
    content: "";
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(31,31,58,0.35);
    border-radius: 3px;
    pointer-events: none;
  }

  .cell.win {
    animation: glow 1.1s ease-in-out infinite alternate;
    border-color: #1f1f3a;
  }
  @keyframes glow {
    from { box-shadow: 0 0 6px 0px rgba(125,224,255,0.6); }
    to { box-shadow: 0 0 16px 4px rgba(125,224,255,1); }
  }

  .banner {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.3);
    margin: 0;
    font-family: 'Cinzel', serif;
    font-size: 64px;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: #feffeb;
    text-shadow: 0 0 20px rgba(125,224,255,0.9), 0 0 60px rgba(125,224,255,0.6), 0 4px 0 #1f1f3a;
    opacity: 0;
    pointer-events: none;
    text-align: center;
    z-index: 20;
  }
  .banner.show {
    animation: bannerpop 7s cubic-bezier(.34,1.2,.64,1) forwards;
  }
  @keyframes bannerpop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    12%  { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    22%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    92%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.05); }
  }

  .confetti {
    position: fixed;
    top: -20px;
    width: 10px;
    height: 16px;
    z-index: 15;
    pointer-events: none;
    animation: confettifall linear forwards;
  }
  @keyframes confettifall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(105vh) rotate(540deg); opacity: 0.9; }
  }

  .footnote {
    margin-top: 10px;
    font-size: 11px;
    color: #bfe6f5;
    text-align: center;
  }
</style>
</head>

<h1>Shaye's League Bingo</h1>
<a class="twitch-link" href="https://www.twitch.tv/shayehayes" target="_blank" rel="noopener">Watch on Twitch</a>
<div class="subtitle">let the league chaos begin</div>

<div class="controls">
  <button class="ctrl" id="reshuffle">Reshuffle</button>
  <button class="ctrl" id="reset">Clear board</button>
</div>

<div class="flash-overlay" id="flashOverlay"></div>

<div class="board-frame">
  <div class="board" id="board"></div>
</div>

<div class="banner" id="banner">Bingo</div>
<div class="footnote">click a square when it happens live &middot; center is free</div>

<script>
const squares = [
  "someone insta-locks yasuo",
  "\"ff15\" before 10 minutes",
  "\"jungle diff\" in all chat",
  "\"ez\" typed after the game",
  "someone locks yuumi support",
  "disconnect at the worst time",
  "jungle skips every objective",
  "client crashes mid-queue",
  "stuck on the loading screen",
  "client freezes during champ select",
  "has to relaunch the client",
  "someone dodges champ select",
  "teammates afk",
  "someone int-feeds on purpose",
  "team argues about who's smurfing",
  "pentakill, then still loses",
  "someone rage-buys wrong items",
  "someone says \"skill issue\"",
  "top laner shows up to a teamfight late",
  "someone flames in champ select before the game starts",
  "useless spam pings",
  "spams emotes on repeat",
  "misses a minion",
  "support steals a cannon minion",
  "jungle takes a wave",
  "circle hate",
  "support can't hide",
  "team face checks a bush",
  "has to report someone",
  "sexist comments",
  "hate speech",
  "most damage, still blamed for the loss",
  "cait gets banned",
  "jungle takes drag with no smite and it gets stolen",
  "teammate trashtalks own team in all chat",
  "\"bot diff\" but bot is the only one who won lane",
  "support insta-locks an enchanter",
  "player declines ready check",
  "assigned role didn't get selected",
  "a stupid remake happens",
  "shaye makes tokyo drift sounds",
  "shaye forgets the vpn",
  "shaye's so locked in she falls behind in chat",
  "shaye says \"push push push\"",
  "shaye sings \"do you wanna kill a dragon\"",
  "shaye insults a player's name or brings up rachel",
  "support recalls in vision",
  "viking kill-steals on nautilus support",
  "gets camped and own jungle does nothing",
  "teammate comes into twitch chat and is rude",
  "shaye says \"there's a bear in there\""
];

const POOL_SIZE = 24;

let order = [];
let marked = [];
let celebratedCount = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildOrder() {
  const shuffled = shuffle(squares).slice(0, POOL_SIZE);
  const withFree = [...shuffled];
  withFree.splice(12, 0, "FREE");
  return withFree;
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  order.forEach((text, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell' + (i === 12 ? ' free' : '') + (marked[i] ? ' marked' : '');
    cell.textContent = text;
    cell.dataset.index = i;
    if (i !== 12) {
      cell.addEventListener('click', () => toggle(i));
    }
    board.appendChild(cell);
  });
  checkWin();
}

function toggle(i) {
  marked[i] = !marked[i];
  render();
}

function spawnConfetti() {
  const colors = ['#7de0ff', '#f4a0a0', '#feffeb', '#1f1f3a', '#9146FF'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDuration = (2 + Math.random() * 1.5) + 's';
    piece.style.animationDelay = (Math.random() * 0.4) + 's';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 4000);
  }
}

function checkWin() {
  const lines = [];
  for (let r = 0; r < 5; r++) lines.push([0,1,2,3,4].map(c => r*5+c));
  for (let c = 0; c < 5; c++) lines.push([0,1,2,3,4].map(r => r*5+c));
  lines.push([0,6,12,18,24]);
  lines.push([4,8,12,16,20]);

  const cells = document.querySelectorAll('.cell');
  cells.forEach(c => c.classList.remove('win'));

  let winCount = 0;
  lines.forEach(line => {
    if (line.every(idx => marked[idx] || idx === 12)) {
      winCount++;
      line.forEach(idx => {
        const el = document.querySelector('.cell[data-index="' + idx + '"]');
        if (el) el.classList.add('win');
      });
    }
  });

  const banner = document.getElementById('banner');
  const overlay = document.getElementById('flashOverlay');

  if (winCount > celebratedCount) {
    banner.classList.remove('show');
    overlay.classList.remove('flash-active');
    void banner.offsetWidth;
    void overlay.offsetWidth; // restart animations
    banner.textContent = winCount > 1 ? 'Bingo x' + winCount : 'Bingo';
    banner.classList.add('show');
    overlay.classList.add('flash-active');
    spawnConfetti();
    celebratedCount = winCount;
  } else if (winCount === 0) {
    banner.classList.remove('show');
    celebratedCount = 0;
  }
}

function newGame() {
  order = buildOrder();
  marked = order.map(() => false);
  celebratedCount = 0;
  render();
}

document.getElementById('reshuffle').addEventListener('click', newGame);
document.getElementById('reset').addEventListener('click', () => {
  marked = order.map(() => false);
  celebratedCount = 0;
  render();
});

newGame();
</script>
